# wmb.stonedrumpoem.cn — 外卖宝 API 反向代理（仅后端，8118）
# 部署示例:
#   sudo cp nginx/wmb.stonedrumpoem.cn.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/wmb.stonedrumpoem.cn.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 证书路径请按实际文件修改（常见来源）:
#   - 阿里云下载: /etc/nginx/ssl/wmb.stonedrumpoem.cn.pem + .key
#   - certbot:    /etc/letsencrypt/live/wmb.stonedrumpoem.cn/fullchain.pem + privkey.pem

# 域名所有权 / SSL 验证文件目录
# 验证目录: /var/www/wmb-verify
#
# HTTP  验证示例:
#   http://wmb.stonedrumpoem.cn/.well-known/pki-validation/xxx.txt
# HTTPS 验证示例:
#   https://wmb.stonedrumpoem.cn/.well-known/pki-validation/xxx.txt
# 对应文件:
#   /var/www/wmb-verify/.well-known/pki-validation/xxx.txt
#
# 首次部署:
#   sudo mkdir -p /var/www/wmb-verify/.well-known/pki-validation
#   sudo chown -R www-data:www-data /var/www/wmb-verify
#
# 若尚未有正式证书但需 HTTPS 文件验证，可临时用自签名证书启动 443:
#   sudo openssl req -x509 -nodes -days 7 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/wmb.stonedrumpoem.cn.key \
#     -out /etc/nginx/ssl/wmb.stonedrumpoem.cn.pem \
#     -subj "/CN=wmb.stonedrumpoem.cn"

# ========== HTTP 80：域名验证 + 跳转 HTTPS ==========
server {
    listen 80;
    server_name wmb.stonedrumpoem.cn;

    # .well-known（HTTP / HTTPS 验证均可用；80 端口不跳转 HTTPS）
    location ^~ /.well-known/pki-validation/ {
        alias /var/www/wmb-verify/.well-known/pki-validation/;
        default_type text/plain;
        charset utf-8;
        allow all;
    }

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/wmb-verify/.well-known/acme-challenge/;
        default_type text/plain;
        charset utf-8;
        allow all;
    }

    location ^~ /.well-known/ {
        alias /var/www/wmb-verify/.well-known/;
        default_type text/plain;
        charset utf-8;
        allow all;
    }

    # 根目录 .txt / .html 验证文件
    location ~* ^/[0-9A-Za-z_.-]+\.(txt|html|htm)$ {
        root /var/www/wmb-verify;
        default_type text/plain;
        charset utf-8;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ========== HTTPS 443：SSL + 反向代理 ==========
# 与同机其他站点（如 iot）保持一致，使用 listen 443 ssl; 避免 http2 选项冲突告警
server {
    listen 443 ssl;
    server_name wmb.stonedrumpoem.cn;
    charset utf-8;

    # ---------- SSL 证书（按服务器实际路径修改） ----------
    ssl_certificate     /etc/nginx/ssl/wmb.stonedrumpoem.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/wmb.stonedrumpoem.cn.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 上传送达照片（base64）时适当放宽请求体限制
    client_max_body_size 10m;

    # ========== HTTPS 域名验证（优先于 API 代理，直接读本地文件） ==========
    location ^~ /.well-known/pki-validation/ {
        alias /var/www/wmb-verify/.well-known/pki-validation/;
        default_type text/plain;
        charset utf-8;
        allow all;
    }

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/wmb-verify/.well-known/acme-challenge/;
        default_type text/plain;
        charset utf-8;
        allow all;
    }

    location ^~ /.well-known/ {
        alias /var/www/wmb-verify/.well-known/;
        default_type text/plain;
        charset utf-8;
        allow all;
    }

    # 根目录 .txt / .html 验证文件（HTTPS 也可访问）
    location ~* ^/[0-9A-Za-z_.-]+\.(txt|html|htm)$ {
        root /var/www/wmb-verify;
        default_type text/plain;
        charset utf-8;
        allow all;
    }

    # 送达照片静态文件（后端写入 /var/wmb_api_py/uploads/）
    # 兼容 API 返回的 /Upload/ 与 GetImgUrl 的 /upload/ 两种路径
    location ^~ /Upload/ {
        alias /var/wmb_api_py/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ^~ /upload/ {
        alias /var/wmb_api_py/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # 后端 API（/api/* -> 8118）
    location /api/ {
        proxy_pass http://127.0.0.1:8118/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    # 健康检查（可选，直连后端根路径）
    location = /health {
        proxy_pass http://127.0.0.1:8118/health;
        proxy_set_header Host $host;
    }
}
